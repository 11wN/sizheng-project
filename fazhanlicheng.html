<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>团队宣言 - 关于我们</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <script src="https://cdn.bootcdn.net/ajax/libs/pdf.js/2.9.359/pdf.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', '微软雅黑', sans-serif;
        }

        body {
            background: #f8f9fa;
            color: #1e1e1e;
            line-height: 1.6;
            min-height: 100vh;
        }

        :root {
            --teal: #b22222;
            --teal-light: #b22222;
            --red-deep: #b22222;
            --white: #fff;
        }

        .history-header {
            background: linear-gradient(135deg, var(--teal) 0%, var(--teal-light) 100%);
            padding: 2.5rem 1.5rem;
            text-align: center;
            color: white;
            position: relative;
            border-bottom: 6px solid var(--red-deep);
        }

        .history-header h1 {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 0.5rem;
        }

        .history-header p {
            font-size: 1.1rem;
            color: #d1f2eb;
            max-width: 600px;
            margin: 0 auto;
        }

        .breadcrumb {
            position: absolute;
            left: 20px;
            top: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .breadcrumb a {
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            padding: 6px 12px;
            border-radius: 15px;
            background: rgba(255,255,255,0.2);
            transition: all 0.3s;
        }

        .breadcrumb a:hover {
            background: rgba(255,255,255,0.3);
            color: #ffd700;
        }

        .content-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 20px;
        }

        .section-title {
            color: var(--teal);
            font-size: 1.8rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .files-section {
            background: white;
            border-radius: 15px;
            padding: 2rem;
            margin: 2rem 0;
            box-shadow: 0 3px 15px rgba(0,0,0,0.1);
        }

        .files-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 1.5rem;
        }

        .pagination {
            text-align: center;
            margin: 1.5rem 0;
            padding: 1rem;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .pagination-info {
            margin-bottom: 1rem;
            color: #666;
            font-size: 0.9rem;
        }

        .pagination-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .pagination-btn {
            padding: 8px 16px;
            border: 1px solid var(--teal);
            border-radius: 6px;
            background: white;
            color: var(--teal);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .pagination-btn:hover {
            background: var(--teal);
            color: white;
        }

        .pagination-btn:disabled {
            background: #f0f0f0;
            color: #ccc;
            border-color: #ddd;
            cursor: not-allowed;
        }

        .page-info {
            font-weight: bold;
            color: var(--teal);
        }

        .file-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 1.5rem;
            border-left: 4px solid var(--teal);
            transition: all 0.3s;
        }

        .file-card:hover {
            background: white;
            transform: translateX(5px);
        }

        .file-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 1rem;
        }

        .file-icon {
            font-size: 2rem;
            color: var(--teal);
        }

        .file-name {
            color: var(--teal);
            font-weight: bold;
            font-size: 1.1rem;
            word-break: break-word;
        }

        .file-meta {
            color: #666;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            line-height: 1.4;
        }

        .file-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .action-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn-download {
            background: var(--teal);
            color: white;
        }

        .btn-delete {
            background: #e74c3c;
            color: white;
        }

        .upload-section {
            background: linear-gradient(135deg, #e8f6f3 0%, #d0ece7 100%);
            border-radius: 15px;
            padding: 2.5rem;
            margin-top: 2rem;
            border: 3px dashed var(--teal);
            text-align: center;
        }

        .upload-area {
            max-width: 500px;
            margin: 0 auto;
        }

        .upload-btn {
            background: var(--teal);
            border: none;
            color: white;
            font-weight: bold;
            padding: 12px 30px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            margin: 8px;
        }

        .upload-btn:hover {
            background: #16a085;
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .timeline::before {
                left: 20px;
            }
            
            .timeline-item:nth-child(odd) .timeline-content,
            .timeline-item:nth-child(even) .timeline-content {
                margin-left: 0;
                margin-right: 0;
                text-align: left;
                padding-left: 2rem;
                padding-right: 1rem;
            }
            
            .timeline-year {
                left: 20px;
                transform: translateY(-50%);
            }
            
            .files-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="history-header">
        <div class="breadcrumb">
            <a href="wangye.html"><i class="fas fa-home"></i> 首页</a>
            <a href="guanyuwomen.html">关于我们</a>
            <span style="background: rgba(255,255,255,0.3); color: #ffd700;">团队宣言</span>
        </div>
        <h1><i class="fas fa-chart-line"></i> 团队宣言</h1>
        <p>历史档案 · 发展记录 · 重要时刻 · 里程碑事件</p>
    </header>

    <div class="content-container">

        <!-- 文件展示区域 -->
        <div class="files-section">
            <h2 class="section-title"><i class="fas fa-archive"></i> 团队宣言</h2>
            <div class="files-grid" id="file-list">
                <div style="grid-column: 1 / -1; text-align: center; padding: 3rem; color: #666;">
                    <i class="fas fa-chart-line" style="font-size: 4rem; color: #ddd; margin-bottom: 1rem;"></i>
                    <h3>暂无团队宣言</h3>
                    <p>上传的团队宣言将显示在这里</p>
                </div>
            </div>
            
            <!-- 分页控件 -->
            <div class="pagination" id="pagination">
                <div class="pagination-info" id="pagination-info">
                    共 0 个文件
                </div>
                <div class="pagination-controls">
                    <button class="pagination-btn" id="prev-page" disabled>
                        <i class="fas fa-chevron-left"></i> 上一页
                    </button>
                    <span class="page-info" id="page-info">1 / 1</span>
                    <button class="pagination-btn" id="next-page" disabled>
                        下一页 <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- 上传区域 -->
        <div class="upload-section">
            <h2 class="section-title"><i class="fas fa-cloud-upload-alt"></i> 上传团队宣言</h2>
            <div class="upload-area">
                <p style="margin-bottom: 1.5rem; color: #666;">
                    上传历史档案、重要时刻等相关资料
                </p>
                
                <input type="file" id="file-input" accept=".doc,.docx,.ppt,.pptx,.txt,.pdf,.jpg,.jpeg,.png,.zip,.rar,.7z,.mp4,.avi,.mov,.mkv,.mp3,.wav" multiple style="display: none;">
                <button class="upload-btn" onclick="document.getElementById('file-input').click()">
                    <i class="fas fa-file-upload"></i> 选择团队宣言
                </button>
                
                <div id="selected-files" style="margin-top: 1.5rem; text-align: left; background: white; padding: 1rem; border-radius: 8px; max-height: 150px; overflow-y: auto;"></div>
                
                <div style="width: 100%; height: 5px; background: #f0f0f0; border-radius: 3px; overflow: hidden; margin: 1rem 0; display: none;" id="progress-bar">
                    <div style="height: 100%; background: var(--teal); width: 0%; transition: width 0.3s ease;" id="progress-fill"></div>
                </div>
                
                <button class="upload-btn" id="start-upload" style="display: none; background: var(--red-deep);">
                    <i class="fas fa-upload"></i> 开始上传
                </button>
            </div>
        </div>
    </div>

    <!-- 预览模态框 -->
    <div id="preview-modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 10000; align-items: center; justify-content: center;">
        <div style="background: white; border-radius: 10px; width: 90%; max-width: 1000px; max-height: 90vh; overflow: hidden; display: flex; flex-direction: column;">
            <div style="padding: 1rem; background: var(--teal); color: white; display: flex; justify-content: space-between; align-items: center;">
                <h3 id="preview-title" style="margin: 0;">文件预览</h3>
                <button onclick="closeModal()" style="background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer;">&times;</button>
            </div>
            <div id="preview-content" style="flex: 1; overflow: auto; padding: 1rem;">
                <!-- 预览内容将在这里显示 -->
            </div>
            <div id="pdf-controls" style="padding: 1rem; background: #f8f9fa; border-top: 1px solid #ddd; display: flex; justify-content: space-between; align-items: center; display: none;">
                <button id="pdf-prev-page" style="padding: 6px 12px; background: var(--teal); color: white; border: none; border-radius: 4px; cursor: pointer;">
                    <i class="fas fa-chevron-left"></i> 上一页
                </button>
                <span id="pdf-page-info" style="color: #666;">第 1 页，共 1 页</span>
                <button id="pdf-next-page" style="padding: 6px 12px; background: var(--teal); color: white; border: none; border-radius: 4px; cursor: pointer;">
                    下一页 <i class="fas fa-chevron-right"></i>
                </button>
            </div>
        </div>
    </div>

    <script>
        // 文件处理函数
        function getFileIcon(fileType, fileName) {
            const ext = fileName.split('.').pop().toLowerCase();
            
            if (fileType.includes('pdf')) {
                return 'fa-file-pdf';
            } else if (fileType.includes('word') || fileType.includes('document')) {
                return 'fa-file-word';
            } else if (fileType.includes('powerpoint') || fileType.includes('presentation')) {
                return 'fa-file-powerpoint';
            } else if (fileType.startsWith('image/')) {
                return 'fa-file-image';
            } else {
                return 'fa-file';
            }
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function formatTime(timestamp) {
            return new Date(timestamp).toLocaleString('zh-CN');
        }

        // 分页变量
        let currentPage = 1;
        const pageSize = 50;
        let totalFiles = 0;
        let totalPages = 1;
        
        // PDF预览相关变量
        let pdfDoc = null;
        let currentPdfPage = 1;
        
        // 检查文件是否可预览
        function isPreviewable(fileType, fileName) {
            const ext = fileName.split('.').pop().toLowerCase();
            return ext === 'pdf' || ext === 'txt' || 
                   ['jpg', 'jpeg', 'png', 'gif', 'bmp'].includes(ext);
        }
        
        // 关闭预览模态框
        function closeModal() {
            const modal = document.getElementById('preview-modal');
            const content = document.getElementById('preview-content');
            const pdfControls = document.getElementById('pdf-controls');
            modal.style.display = 'none';
            content.innerHTML = '';
            pdfControls.style.display = 'none';
            document.body.style.overflow = '';
            pdfDoc = null;
            currentPdfPage = 1;
        }
        
        // 预览文件
        async function previewFile(fileId, fileName) {
            try {
                const response = await fetch(`/api/download/${fileId}`);
                if (!response.ok) throw new Error('获取文件失败');
                
                const modal = document.getElementById('preview-modal');
                const previewTitle = document.getElementById('preview-title');
                const previewContent = document.getElementById('preview-content');
                const pdfControls = document.getElementById('pdf-controls');
                
                previewTitle.textContent = `预览: ${fileName}`;
                
                const ext = fileName.split('.').pop().toLowerCase();
                
                if (ext === 'pdf') {
                    // 使用PDF.js预览PDF文件
                    const blob = await response.blob();
                    const url = URL.createObjectURL(blob);
                    
                    // 创建PDF.js容器
                    previewContent.innerHTML = `
                        <div style="width: 100%; height: 60vh; overflow: auto;">
                            <div id="pdf-container" style="text-align: center;"></div>
                        </div>
                    `;
                    
                    pdfControls.style.display = 'flex';
                    modal.style.display = 'flex';
                    document.body.style.overflow = 'hidden';
                    
                    // 加载PDF
                    const loadingTask = pdfjsLib.getDocument(url);
                    loadingTask.promise.then(function(pdf) {
                        pdfDoc = pdf;
                        const numPages = pdf.numPages;
                        document.getElementById('pdf-page-info').textContent = `第 ${currentPdfPage} 页，共 ${numPages} 页`;
                        
                        // 渲染当前页
                        function renderPage(pageNum) {
                            pdf.getPage(pageNum).then(function(page) {
                                const container = document.getElementById('pdf-container');
                                container.innerHTML = '';
                                
                                const canvas = document.createElement('canvas');
                                canvas.id = 'pdf-canvas';
                                canvas.style.maxWidth = '100%';
                                container.appendChild(canvas);
                                
                                const context = canvas.getContext('2d');
                                
                                const viewport = page.getViewport({ scale: 1.5 });
                                canvas.height = viewport.height;
                                canvas.width = viewport.width;
                                
                                const renderContext = {
                                    canvasContext: context,
                                    viewport: viewport
                                };
                                
                                page.render(renderContext);
                                
                                // 更新页码信息
                                document.getElementById('pdf-page-info').textContent = `第 ${pageNum} 页，共 ${numPages} 页`;
                                
                                // 更新按钮状态
                                document.getElementById('pdf-prev-page').disabled = pageNum === 1;
                                document.getElementById('pdf-next-page').disabled = pageNum === numPages;
                            });
                        }
                        
                        // 初始渲染
                        renderPage(currentPdfPage);
                        
                        // 清除旧的事件监听器（通过重新创建按钮）
                        const prevBtn = document.getElementById('pdf-prev-page');
                        const nextBtn = document.getElementById('pdf-next-page');
                        const newPrevBtn = prevBtn.cloneNode(true);
                        const newNextBtn = nextBtn.cloneNode(true);
                        prevBtn.parentNode.replaceChild(newPrevBtn, prevBtn);
                        nextBtn.parentNode.replaceChild(newNextBtn, nextBtn);
                        
                        // 绑定分页按钮事件
                        document.getElementById('pdf-prev-page').addEventListener('click', function() {
                            if (currentPdfPage > 1) {
                                currentPdfPage--;
                                renderPage(currentPdfPage);
                            }
                        });
                        
                        document.getElementById('pdf-next-page').addEventListener('click', function() {
                            if (currentPdfPage < numPages) {
                                currentPdfPage++;
                                renderPage(currentPdfPage);
                            }
                        });
                    });
                } else if (['jpg', 'jpeg', 'png', 'gif', 'bmp'].includes(ext)) {
                    // 预览图片
                    const blob = await response.blob();
                    const url = URL.createObjectURL(blob);
                    pdfControls.style.display = 'none';
                    modal.style.display = 'flex';
                    document.body.style.overflow = 'hidden';
                    const img = document.createElement('img');
                    img.src = url;
                    img.style.maxWidth = '100%';
                    img.style.maxHeight = '70vh';
                    previewContent.innerHTML = '';
                    previewContent.appendChild(img);
                } else if (ext === 'txt') {
                    // 预览文本文件
                    const blob = await response.blob();
                    const text = await blob.text();
                    pdfControls.style.display = 'none';
                    modal.style.display = 'flex';
                    document.body.style.overflow = 'hidden';
                    const pre = document.createElement('pre');
                    pre.style.whiteSpace = 'pre-wrap';
                    pre.style.wordBreak = 'break-all';
                    pre.style.fontFamily = 'monospace';
                    pre.style.maxHeight = '70vh';
                    pre.style.overflow = 'auto';
                    pre.textContent = text;
                    previewContent.innerHTML = '';
                    previewContent.appendChild(pre);
                } else {
                    alert('该文件类型不支持预览');
                }
            } catch (error) {
                console.error('预览文件失败:', error);
                alert('文件预览失败');
            }
        }

        // 加载文件列表
        async function loadFiles(page = 1) {
            try {
                const response = await fetch(`/api/uploads?module=发展历程&page=${page}&page_size=${pageSize}`);
                if (!response.ok) throw new Error('获取文件列表失败');
                
                const result = await response.json();
                let files = [];
                if (Array.isArray(result)) {
                    files = result;
                    totalFiles = files.length;
                    totalPages = Math.ceil(totalFiles / pageSize);
                } else if (result && Array.isArray(result.files)) {
                    files = result.files;
                    totalFiles = result.total || files.length;
                    totalPages = result.total_pages || Math.ceil(totalFiles / pageSize);
                }
                
                displayFiles(files);
                updatePaginationControls(page, totalPages, totalFiles);
                currentPage = page;
                
            } catch (error) {
                console.error('加载文件错误:', error);
                document.getElementById('file-list').innerHTML = `
                    <div style="grid-column: 1 / -1; text-align: center; padding: 2rem; color: #e74c3c;">
                        <i class="fas fa-exclamation-triangle" style="font-size: 3rem; margin-bottom: 1rem;"></i>
                        <h3>加载失败</h3>
                        <p>${error.message}</p>
                    </div>
                `;
            }
        }

        // 更新分页控件
        function updatePaginationControls(page, totalPages, totalFiles) {
            document.getElementById('pagination-info').textContent = `共 ${totalFiles} 个文件`;
            document.getElementById('page-info').textContent = `${page} / ${totalPages}`;
            
            document.getElementById('prev-page').disabled = page === 1;
            document.getElementById('next-page').disabled = page === totalPages;
        }

        // 分页按钮事件
        document.getElementById('prev-page').addEventListener('click', function() {
            if (currentPage > 1) {
                loadFiles(currentPage - 1);
            }
        });

        document.getElementById('next-page').addEventListener('click', function() {
            if (currentPage < totalPages) {
                loadFiles(currentPage + 1);
            }
        });

        // 显示文件列表
        function displayFiles(files) {
            const fileList = document.getElementById('file-list');
            
            if (files.length === 0) {
                fileList.innerHTML = `
                    <div style="grid-column: 1 / -1; text-align: center; padding: 3rem; color: #666;">
                        <i class="fas fa-chart-line" style="font-size: 4rem; color: #ddd; margin-bottom: 1rem;"></i>
                        <h3>暂无团对宣言</h3>
                        <p>当前还没有上传团队宣言</p>
                    </div>
                `;
                return;
            }
            
            fileList.innerHTML = files.map(file => {
                const isPreviewableFile = isPreviewable(file.file_type, file.original_name);
                return `
                <div class="file-card">
                    <div class="file-header">
                        <i class="fas file-icon ${getFileIcon(file.file_type, file.original_name)}"></i>
                        <div class="file-name">${file.original_name}</div>
                    </div>
                    <div class="file-meta">
                        <p><i class="fas fa-weight-hanging"></i> ${formatFileSize(file.file_size)}</p>
                        <p><i class="fas fa-clock"></i> ${formatTime(file.upload_time)}</p>
                        <p><i class="fas fa-user"></i> ${file.uploader}</p>
                        ${file.description ? `<p><i class="fas fa-info-circle"></i> ${file.description}</p>` : ''}
                    </div>
                    <div class="file-actions">
                        ${isPreviewableFile ? `<button class="action-btn" style="background: #3498db; color: white;" onclick="previewFile(${file.id}, '${file.original_name}')"><i class="fas fa-eye"></i> 预览</button>` : ''}
                        <button class="action-btn btn-download" onclick="downloadFile(${file.id})">
                            <i class="fas fa-download"></i> 下载
                        </button>
                        <button class="action-btn btn-delete" onclick="deleteFile(${file.id})">
                            <i class="fas fa-trash"></i> 删除
                        </button>
                    </div>
                </div>
            `;
            }).join('');
        }

        // 下载和删除功能
        async function downloadFile(fileId) {
            try {
                window.open(`/api/download/${fileId}`, '_blank');
            } catch (error) {
                alert('下载失败: ' + error.message);
            }
        }

        async function deleteFile(fileId) {
            if (!confirm('确定要删除这个发展历程文件吗？此操作不可撤销。')) {
                return;
            }
            
            try {
                const response = await fetch(`/api/delete/${fileId}`, {
                    method: 'DELETE'
                });
                
                if (!response.ok) throw new Error('删除失败');
                
                alert('文件删除成功');
                loadFiles();
                
            } catch (error) {
                alert('删除失败: ' + error.message);
            }
        }

        // 文件上传功能
        let selectedFiles = [];
        
        document.getElementById('file-input').addEventListener('change', function(e) {
            selectedFiles = Array.from(e.target.files);
            const fileList = document.getElementById('selected-files');
            
            if (selectedFiles.length === 0) {
                fileList.innerHTML = '';
                document.getElementById('start-upload').style.display = 'none';
                return;
            }
            
            fileList.innerHTML = '<h4 style="color: var(--teal); margin-bottom: 1rem;">已选择团队宣言:</h4>' + selectedFiles.map(file =>
                `<div style="margin: 8px 0; padding: 8px; background: #f8f9fa; border-radius: 6px; border-left: 3px solid var(--teal);">
                    <i class="fas fa-file"></i> <strong>${file.name}</strong> 
                    <span style="color: #666; font-size: 0.9rem;">(${formatFileSize(file.size)})</span>
                </div>`
            ).join('');
            
            document.getElementById('start-upload').style.display = 'inline-flex';
        });

        document.getElementById('start-upload').addEventListener('click', async function() {
            if (selectedFiles.length === 0) return;
            
            const description = prompt('请输入发展资料描述（如：事件名称、时间节点等）:', '');
            const uploader = prompt('请输入您的姓名（可选）:', '匿名');
            
            const progressBar = document.getElementById('progress-bar');
            const progressFill = document.getElementById('progress-fill');
            const uploadBtn = document.getElementById('start-upload');
            
            progressBar.style.display = 'block';
            uploadBtn.disabled = true;
            uploadBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 上传中...';
            
            let uploadedCount = 0;
            const totalFiles = selectedFiles.length;
            
            for (let i = 0; i < selectedFiles.length; i++) {
                const file = selectedFiles[i];
                
                try {
                    const formData = new FormData();
                    formData.append('file', file);
                    formData.append('module', '发展历程');
                    formData.append('description', description || '');
                    formData.append('uploader', uploader || '匿名');
                    
                    const response = await fetch('/api/upload', {
                        method: 'POST',
                        body: formData
                    });
                    
                    if (!response.ok) {
                        throw new Error(`上传失败: ${response.statusText}`);
                    }
                    
                    uploadedCount++;
                    progressFill.style.width = `${(uploadedCount / totalFiles) * 100}%`;
                    
                } catch (error) {
                    console.error('上传错误:', error);
                    alert(`上传失败: ${error.message}`);
                    break;
                }
            }
            
            progressFill.style.background = '#27ae60';
            uploadBtn.innerHTML = '<i class="fas fa-check"></i> 上传完成';
            
            setTimeout(() => {
                progressBar.style.display = 'none';
                uploadBtn.style.display = 'none';
                document.getElementById('selected-files').innerHTML = '';
                document.getElementById('file-input').value = '';
                uploadBtn.disabled = false;
                uploadBtn.innerHTML = '<i class="fas fa-upload"></i> 开始上传';
                
                loadFiles();
                alert(`✅ 成功上传 ${uploadedCount} 个发展历程文件`);
            }, 1000);
        });

        // 页面加载时初始化
        document.addEventListener('DOMContentLoaded', function() {
            loadFiles();
        });
    </script>
</body>
</html>
