<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>思想道德与法治 - 思政实践平台</title>
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', '微软雅黑', sans-serif;
        }

        body {
            background: #f8f9fa;
            color: #1e1e1e;
            line-height: 1.6;
            min-height: 100vh;
        }

        :root {
            --green: #b22222;
            --green-light: #b22222;
            --red-deep: #b22222;
            --white: #fff;
        }

        .resource-header {
            background: linear-gradient(135deg, var(--green) 0%, var(--green-light) 100%);
            padding: 2.5rem 1.5rem;
            text-align: center;
            color: white;
            position: relative;
            border-bottom: 6px solid var(--red-deep);
        }

        .resource-header h1 {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 0.5rem;
        }

        .resource-header p {
            font-size: 1.1rem;
            color: #e6ffe6;
            max-width: 600px;
            margin: 0 auto;
        }

        .breadcrumb {
            position: absolute;
            left: 20px;
            top: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .breadcrumb a {
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            padding: 6px 12px;
            border-radius: 15px;
            background: rgba(255,255,255,0.2);
            transition: all 0.3s;
        }

        .breadcrumb a:hover {
            background: rgba(255,255,255,0.3);
            color: #ffd700;
        }

        .content-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 20px;
        }

        .section-title {
            color: var(--green);
            font-size: 1.8rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .files-section {
            background: white;
            border-radius: 15px;
            padding: 2rem;
            margin: 2rem 0;
            box-shadow: 0 3px 15px rgba(0,0,0,0.1);
        }

        .files-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 1.5rem;
        }

        .pagination {
            text-align: center;
            margin: 1.5rem 0;
            padding: 1rem;
            background: #f8f9fa;
            border-radius: 10px;
        }

        .pagination-info {
            margin-bottom: 1rem;
            color: #666;
            font-size: 0.9rem;
        }

        .pagination-controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .pagination-btn {
            padding: 8px 16px;
            border: 1px solid var(--green);
            border-radius: 6px;
            background: white;
            color: var(--green);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .pagination-btn:hover {
            background: var(--green);
            color: white;
        }

        .pagination-btn:disabled {
            background: #f0f0f0;
            color: #ccc;
            border-color: #ddd;
            cursor: not-allowed;
        }

        .page-info {
            font-weight: bold;
            color: var(--green);
        }

        .file-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 1.5rem;
            border-left: 4px solid var(--green);
            transition: all 0.3s;
        }

        .file-card:hover {
            background: white;
            transform: translateX(5px);
        }

        .file-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 1rem;
        }

        .file-icon {
            font-size: 2rem;
            color: var(--green);
        }

        .file-name {
            color: var(--green);
            font-weight: bold;
            font-size: 1.1rem;
            word-break: break-word;
        }

        .file-meta {
            color: #666;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            line-height: 1.4;
        }

        .file-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .action-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .btn-download {
            background: var(--green);
            color: white;
        }

        .btn-delete {
            background: #e74c3c;
            color: white;
        }

        .upload-section {
            background: linear-gradient(135deg, #f0fff4 0%, #e6ffe6 100%);
            border-radius: 15px;
            padding: 2.5rem;
            margin-top: 2rem;
            border: 3px dashed var(--green);
            text-align: center;
        }

        .upload-area {
            max-width: 500px;
            margin: 0 auto;
        }

        .upload-btn {
            background: var(--green);
            border: none;
            color: white;
            font-weight: bold;
            padding: 12px 30px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
            margin: 8px;
        }

        .upload-btn:hover {
            background: #2ecc71;
            transform: scale(1.05);
        }

        @media (max-width: 768px) {
            .files-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="resource-header">
        <div class="breadcrumb">
            <a href="wangye.html"><i class="fas fa-home"></i> 首页</a>
            <a href="sizhengshijian.html">思政实践</a>
            <span style="background: rgba(255,255,255,0.3); color: #ffd700;">思想道德与法治</span>
        </div>
        <h1><i class="fas fa-share-alt"></i> 思想道德与法治</h1>
        <p>教学资源 · 实践资料 · 学习工具 · 共享交流</p>
    </header>

    <div class="content-container">
        <!-- 模块导航 -->
        <div class="files-section">
            <h2 class="section-title"><i class="fas fa-th-large"></i> 思政实践模块</h2>
            <div class="files-grid">
                <a href="sizheng1.html" class="file-card" style="text-decoration: none; cursor: pointer;">
                    <div class="file-header">
                        <i class="fas fa-file-alt file-icon"></i>
                        <div class="file-name">思政实践一</div>
                    </div>
                    <div class="file-meta">
                        <p>点击进入模块</p>
                    </div>
                </a>
                <a href="sizheng2.html" class="file-card" style="text-decoration: none; cursor: pointer;">
                    <div class="file-header">
                        <i class="fas fa-file-alt file-icon"></i>
                        <div class="file-name">思政实践二</div>
                    </div>
                    <div class="file-meta">
                        <p>点击进入模块</p>
                    </div>
                </a>
                <a href="sizheng3.html" class="file-card" style="text-decoration: none; cursor: pointer;">
                    <div class="file-header">
                        <i class="fas fa-file-alt file-icon"></i>
                        <div class="file-name">思政实践三</div>
                    </div>
                    <div class="file-meta">
                        <p>点击进入模块</p>
                    </div>
                </a>
                <a href="sizheng4.html" class="file-card" style="text-decoration: none; cursor: pointer;">
                    <div class="file-header">
                        <i class="fas fa-file-alt file-icon"></i>
                        <div class="file-name">思政实践四</div>
                    </div>
                    <div class="file-meta">
                        <p>点击进入模块</p>
                    </div>
                </a>
                <a href="sizheng5.html" class="file-card" style="text-decoration: none; cursor: pointer;">
                    <div class="file-header">
                        <i class="fas fa-file-alt file-icon"></i>
                        <div class="file-name">思政实践五</div>
                    </div>
                    <div class="file-meta">
                        <p>点击进入模块</p>
                    </div>
                </a>
                <a href="sizheng6.html" class="file-card" style="text-decoration: none; cursor: pointer;">
                    <div class="file-header">
                        <i class="fas fa-file-alt file-icon"></i>
                        <div class="file-name">思政实践六</div>
                    </div>
                    <div class="file-meta">
                        <p>点击进入模块</p>
                    </div>
                </a>
            </div>
        </div>

        <!-- 文件展示区域 -->
        <div class="files-section">
            <h2 class="section-title"><i class="fas fa-archive"></i> 思想道德与法治资料库</h2>
            <div class="files-grid" id="file-list">
                <div style="grid-column: 1 / -1; text-align: center; padding: 3rem; color: #666;">
                    <i class="fas fa-share-alt" style="font-size: 4rem; color: #ddd; margin-bottom: 1rem;"></i>
                    <h3>暂无资料</h3>
                    <p>上传的文件将显示在这里</p>
                </div>
            </div>
            
            <!-- 分页控件 -->
            <div class="pagination" id="pagination">
                <div class="pagination-info" id="pagination-info">
                    共 0 个文件
                </div>
                <div class="pagination-controls">
                    <button class="pagination-btn" id="prev-page" disabled>
                        <i class="fas fa-chevron-left"></i> 上一页
                    </button>
                    <span class="page-info" id="page-info">1 / 1</span>
                    <button class="pagination-btn" id="next-page" disabled>
                        下一页 <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
            </div>
        </div>

        <!-- 上传区域 -->
        <div class="upload-section">
            <h2 class="section-title"><i class="fas fa-cloud-upload-alt"></i> 上传资料</h2>
            <div class="upload-area">
                <p style="margin-bottom: 1.5rem; color: #666;">
                    上传教学资料、实践工具、学习资源等相关资料
                </p>
                
                <input type="file" id="file-input" accept=".doc,.docx,.ppt,.pptx,.txt,.pdf,.jpg,.jpeg,.png,.zip,.rar,.7z,.mp4,.avi,.mov,.mkv,.mp3,.wav" multiple style="display: none;">
                <button class="upload-btn" onclick="document.getElementById('file-input').click()">
                    <i class="fas fa-file-upload"></i> 选择文件
                </button>
                
                <div id="selected-files" style="margin-top: 1.5rem; text-align: left; background: white; padding: 1rem; border-radius: 8px; max-height: 150px; overflow-y: auto;"></div>
                
                <div style="width: 100%; height: 5px; background: #f0f0f0; border-radius: 3px; overflow: hidden; margin: 1rem 0; display: none;" id="progress-bar">
                    <div style="height: 100%; background: var(--green); width: 0%; transition: width 0.3s ease;" id="progress-fill"></div>
                </div>
                
                <button class="upload-btn" id="start-upload" style="display: none; background: var(--red-deep);">
                    <i class="fas fa-upload"></i> 开始上传
                </button>
            </div>
        </div>
    </div>

    <script>
        // 文件处理函数
        function getFileIcon(fileType, fileName) {
            const ext = fileName.split('.').pop().toLowerCase();
            
            if (fileType.includes('pdf')) {
                return 'fa-file-pdf';
            } else if (fileType.includes('word') || fileType.includes('document')) {
                return 'fa-file-word';
            } else if (fileType.includes('powerpoint') || fileType.includes('presentation')) {
                return 'fa-file-powerpoint';
            } else if (fileType.startsWith('image/')) {
                return 'fa-file-image';
            } else {
                return 'fa-file';
            }
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function formatTime(timestamp) {
            return new Date(timestamp).toLocaleString('zh-CN');
        }

        // 分页变量
        let currentPage = 1;
        const pageSize = 50;
        let totalFiles = 0;
        let totalPages = 1;

        // 加载文件列表
        async function loadFiles(page = 1) {
            try {
                const response = await fetch(`/api/uploads?module=思想道德与法治&page=${page}&page_size=${pageSize}`);
                if (!response.ok) throw new Error('获取文件列表失败');
                
                const result = await response.json();
                let files = [];
                if (Array.isArray(result)) {
                    files = result;
                    totalFiles = files.length;
                    totalPages = Math.ceil(totalFiles / pageSize);
                } else if (result && Array.isArray(result.files)) {
                    files = result.files;
                    totalFiles = result.total || files.length;
                    totalPages = result.total_pages || Math.ceil(totalFiles / pageSize);
                }
                
                const fileList = document.getElementById('file-list');
                
                if (files.length === 0) {
                    fileList.innerHTML = `
                        <div style="grid-column: 1 / -1; text-align: center; padding: 3rem; color: #666;">
                            <i class="fas fa-share-alt" style="font-size: 4rem; color: #ddd; margin-bottom: 1rem;"></i>
                            <h3>暂无资料</h3>
                            <p>上传的文件将显示在这里</p>
                        </div>
                    `;
                } else {
                    fileList.innerHTML = files.map(file => `
                        <div class="file-card">
                            <div class="file-header">
                                <i class="fas ${getFileIcon(file.file_type, file.original_name)} file-icon"></i>
                                <div class="file-name">${file.original_name}</div>
                            </div>
                            <div class="file-meta">
                                <div><strong>大小:</strong> ${formatFileSize(file.file_size)}</div>
                                <div><strong>上传时间:</strong> ${formatTime(file.upload_time)}</div>
                                <div><strong>上传者:</strong> ${file.uploader || '匿名'}</div>
                                ${file.description ? `<div><strong>描述:</strong> ${file.description}</div>` : ''}
                            </div>
                            <div class="file-actions">
                                <button class="action-btn btn-download" onclick="downloadFile(${file.id})"><i class="fas fa-download"></i> 下载</button>
                                <button class="action-btn btn-delete" onclick="deleteFile(${file.id})"><i class="fas fa-trash"></i> 删除</button>
                            </div>
                        </div>
                    `).join('');
                }
                
                updatePaginationControls(page, totalPages, totalFiles);
                currentPage = page;
                
            } catch (error) {
                console.error('加载文件列表失败:', error);
            }
        }

        // 更新分页控件
        function updatePaginationControls(page, totalPages, totalFiles) {
            document.getElementById('pagination-info').textContent = `共 ${totalFiles} 个文件`;
            document.getElementById('page-info').textContent = `${page} / ${totalPages}`;
            
            document.getElementById('prev-page').disabled = page === 1;
            document.getElementById('next-page').disabled = page === totalPages;
        }

        // 分页按钮事件
        document.getElementById('prev-page').addEventListener('click', function() {
            if (currentPage > 1) {
                loadFiles(currentPage - 1);
            }
        });

        document.getElementById('next-page').addEventListener('click', function() {
            if (currentPage < totalPages) {
                loadFiles(currentPage + 1);
            }
        });

        // 下载文件
        async function downloadFile(fileId) {
            try {
                const response = await fetch(`/api/download/${fileId}`);
                if (!response.ok) throw new Error('下载失败');
                
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = response.headers.get('Content-Disposition')?.split('filename=')[1]?.replace(/"/g, '') || 'file';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);
                
            } catch (error) {
                console.error('下载失败:', error);
                alert('文件下载失败');
            }
        }

        // 删除文件
        async function deleteFile(fileId) {
            if (!confirm('确定要删除这个文件吗？')) return;
            
            try {
                const response = await fetch(`/api/delete/${fileId}`, { method: 'DELETE' });
                if (!response.ok) throw new Error('删除失败');
                
                alert('文件删除成功');
                loadFiles();
                
            } catch (error) {
                console.error('删除失败:', error);
                alert('文件删除失败');
            }
        }

        // 文件选择处理
        const fileInput = document.getElementById('file-input');
        const selectedFilesDiv = document.getElementById('selected-files');
        const startUploadBtn = document.getElementById('start-upload');
        const progressBar = document.getElementById('progress-bar');
        const progressFill = document.getElementById('progress-fill');
        
        let selectedFiles = [];
        
        fileInput.addEventListener('change', function(e) {
            selectedFiles = Array.from(e.target.files);
            
            if (selectedFiles.length === 0) {
                selectedFilesDiv.innerHTML = '';
                startUploadBtn.style.display = 'none';
                return;
            }
            
            selectedFilesDiv.innerHTML = `
                <h4>已选择 ${selectedFiles.length} 个文件:</h4>
                <ul style="margin: 0; padding-left: 1.5rem;">
                    ${selectedFiles.map(file => `<li>${file.name} (${formatFileSize(file.size)})</li>`).join('')}
                </ul>
            `;
            
            startUploadBtn.style.display = 'inline-flex';
        });

        // 上传文件
        startUploadBtn.addEventListener('click', async function() {
            const description = prompt('请输入文件描述（可选）:', '');
            const uploader = prompt('请输入您的姓名（可选）:', '');
            
            progressBar.style.display = 'block';
            startUploadBtn.disabled = true;
            startUploadBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 上传中...';
            
            let uploadedCount = 0;
            const totalFiles = selectedFiles.length;
            
            for (let i = 0; i < selectedFiles.length; i++) {
                const file = selectedFiles[i];
                
                try {
                    const formData = new FormData();
                    formData.append('file', file);
                    formData.append('module', '思想道德与法治');
                    formData.append('description', description || '');
                    formData.append('uploader', uploader || '匿名');
                    
                    const response = await fetch('/api/upload', {
                        method: 'POST',
                        body: formData
                    });
                    
                    if (!response.ok) {
                        throw new Error(`上传失败: ${response.statusText}`);
                    }
                    
                    uploadedCount++;
                    progressFill.style.width = `${(uploadedCount / totalFiles) * 100}%`;
                    
                } catch (error) {
                    console.error('上传错误:', error);
                    alert(`上传失败: ${error.message}`);
                    break;
                }
            }
            
            // 上传完成
            progressFill.style.background = '#27ae60';
            startUploadBtn.innerHTML = '<i class="fas fa-check"></i> 上传完成';
            
            setTimeout(() => {
                progressBar.style.display = 'none';
                startUploadBtn.style.display = 'none';
                selectedFilesDiv.innerHTML = '';
                fileInput.value = '';
                startUploadBtn.disabled = false;
                startUploadBtn.innerHTML = '<i class="fas fa-upload"></i> 开始上传';
                
                // 重新加载文件列表
                loadFiles();
            }, 2000);
        });

        // 页面加载时获取文件列表
        document.addEventListener('DOMContentLoaded', function() {
            loadFiles();
        });
    </script>
</body>
</html>
